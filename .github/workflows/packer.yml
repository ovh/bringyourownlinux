---
name: Builder
on:  # yamllint disable-line rule:truthy
  push:
    tags:
      - '[0-9]+.[0-9]+*'     # 1.0, 10.2.3, ...
      - 'v[0-9]+.[0-9]+*'    # v0.1.0, v1.2, ...
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: build_alpine
            packer_file: alpine.pkr.hcl
            output: alpine.qcow2
          - dir: build_debian-12
            packer_file: debian-12.pkr.hcl
            output: debian-12.qcow2
          - dir: build_archlinux
            packer_file: archlinux.pkr.hcl
            output: archlinux.qcow2
          - dir: build_ubuntu-20.04-kernel-5.15
            packer_file: ubuntu-20.04-kernel-5.15.pkr.hcl
            output: ubuntu-20.04-kernel-5.15.qcow2
    steps:
      - uses: actions/checkout@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils guestfs-tools genisoimage
      - name: Install Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest
      - name: Install Packer QEMU plugin
        working-directory: ${{ matrix.dir }}
        run: |
          if [[ "${{ matrix.packer_file }}" == *.hcl ]]; then
            packer init "${{ matrix.packer_file }}"
          else
            packer plugins install github.com/hashicorp/qemu
          fi
      - name: Build image
        working-directory: ${{ matrix.dir }}
        run: |
          PACKER_LOG=1 packer build -parallel-builds=1 "${{ matrix.packer_file }}"
          sha512sum "output/${{ matrix.output }}" > "output/${{ matrix.output }}.sha512"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.dir }}
          path: |
            ${{ matrix.dir }}/output/${{ matrix.output }}
            ${{ matrix.dir }}/output/${{ matrix.output }}.sha512

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: GH Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  packages:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      packages: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Install ORAS
        uses: oras-project/setup-oras@v1
      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push images as OCI artifacts
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          tag="${GITHUB_REF_NAME}"
          shopt -s nullglob
          for img in artifacts/*.qcow2; do
            name="$(basename "${img%.qcow2}")"
            echo "Pushing ${repo}/${name}:${tag}"
            oras push "${repo}/${name}:${tag}" \
              --artifact-type application/vnd.ovh.byolinux.image.v1 \
              "${img}:application/octet-stream" \
              "${img}.sha512:text/plain"
          done
