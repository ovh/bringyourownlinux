---
name: Builder
on:  # yamllint disable-line rule:truthy
  push:
    tags: ['[0-9].[0-9]+*']
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: build_debian-11-kernel-6
            packer_file: deb11k6.json
            output: deb11k6.qcow2
          - dir: build_archlinux
            packer_file: archlinux.pkr.hcl
            output: archlinux.qcow2
          - dir: build_ubuntu-20.04-kernel-5.15
            packer_file: ubuntu-20.04-kernel-5.15.pkr.hcl
            output: ubuntu-20.04-kernel-5.15.qcow2
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            packer qemu-system-x86 qemu-utils guestfs-tools genisoimage
      - name: Install Packer QEMU plugin
        working-directory: ${{ matrix.dir }}
        run: |
          if [[ "${{ matrix.packer_file }}" == *.hcl ]]; then
            packer init "${{ matrix.packer_file }}"
          else
            packer plugins install github.com/hashicorp/qemu
          fi
      - name: Build image
        working-directory: ${{ matrix.dir }}
        run: |
          PACKER_LOG=1 packer build -parallel-builds=1 "${{ matrix.packer_file }}"
          sha512sum "output/${{ matrix.output }}" > "output/${{ matrix.output }}.sha512"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.dir }}
          path: |
            ${{ matrix.dir }}/output/${{ matrix.output }}
            ${{ matrix.dir }}/output/${{ matrix.output }}.sha512

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: GH Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
